<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <title>
    Advanced OOP Todo Manager
  </title>
  <link rel="stylesheet"
        href="../css/style.css">
</head>
<body>
  <header>
    <h1>
      📝 Advanced OOP Todo Manager
    </h1>
    <button id="themeBtn">
      🌙 Dark Mode
    </button>
  </header>
  <!-- Stats -->
  <section class="stats">
    <div class="card">
      <h3>Total Tasks</h3>
      <p id="totalTasks">
        0
      </p>
    </div>
    <div class="card">
      <h3>Completed</h3>
      <p id="completedTasks">
        0
      </p>
    </div>
    <div class="card">
      <h3>Pending</h3>
      <p id="pendingTasks">
        0
      </p>
    </div>
    <div class="card">
      <h3>Progress</h3>
      <p id="progressPercent">
        0%
      </p>
    </div>
  </section>
  <!-- Form -->
  <section class="form-section">
    <input
      type="text"
      id="taskInput"
      placeholder="Enter task">
    <select id="priority">
      <option value="Low">
        Low
      </option>
      <option value="Medium">
        Medium
      </option>
      <option value="High">
        High
      </option>
    </select>
    <input
      type="date"
      id="dueDate">
    <button id="addBtn">
      Add Task
    </button>
  </section>
  <!-- Search -->
  <section class="search-filter">
    <input
      type="text"
      id="searchInput"
      placeholder="Search task">
    <select id="filterSelect">
      <option value="all">
        All
      </option>
      <option value="completed">
        Completed
      </option>
      <option value="pending">
        Pending
      </option>
    </select>
  </section>
  <!-- Todo List -->
  <section>
    <ul id="todoList">
    </ul>
  </section>
  <!-- Empty State -->
  <div id="emptyState">
    🚀 No Tasks Yet
  </div>
  <script src="../js/script.js"></script>
</body>
</html>
