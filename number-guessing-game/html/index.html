<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <h1>🎯 Guess the Number</h1>
        <input id="guessnumber" maxlength="4" placeholder="Enter 4 digit number">
        <div class="buttons">
            <button onclick="check()">Check</button>
            <button onclick="restart()">Restart</button>
        </div>
        <p id="score">Score: 100</p>
        <p id="attempts">Attempts Left: 10</p>
        <p id="result"></p>
        <h3>History</h3>
        <div id="history"></div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
